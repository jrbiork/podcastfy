AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Podcastify — async podcast generation pipeline

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Environment:
      Variables:
        S3_BUCKET: !Ref JobsBucket
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        APPLE_CLIENT_ID: !Ref AppleClientId

Parameters:
  GoogleClientId:
    Type: String
    Description: Google OAuth Client ID (used for JWT verification)
  AppleClientId:
    Type: String
    Description: Apple bundle ID (used as audience for Apple JWT verification)
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key for gpt-4o-mini script generation
  ElevenLabsApiKey:
    Type: String
    NoEcho: true
    Description: ElevenLabs API key for TTS audio synthesis

Resources:

  # ── S3: job storage ────────────────────────────────────────────────────────
  JobsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub podcastify-jobs-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: ExpireJobs
            Status: Enabled
            Prefix: jobs/
            ExpirationInDays: 1
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ['*']
            MaxAge: 3600

  # ── SQS: job queue ─────────────────────────────────────────────────────────
  JobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: podcastify-jobs
      VisibilityTimeout: 660   # 11 min — must exceed worker Lambda timeout
      MessageRetentionPeriod: 3600

  # ── API Gateway ────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]

  # ── Lambda: Dispatcher (POST /jobs) ────────────────────────────────────────
  DispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: podcastify-dispatcher
      CodeUri: lambdas/
      Handler: dispatcher/handler.handler
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          SQS_QUEUE_URL: !GetAtt JobQueue.QueueUrl
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt JobQueue.QueueName
        - S3WritePolicy:
            BucketName: !Ref JobsBucket
        - S3ReadPolicy:
            BucketName: !Ref JobsBucket
      Events:
        PostJobs:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /jobs
            Method: POST
        PostPdfPresign:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /jobs/pdf/presign
            Method: POST
        PostPdfFinalize:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /jobs/pdf/finalize
            Method: POST

  # ── Lambda: Status (GET /jobs/:id) ─────────────────────────────────────────
  StatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: podcastify-status
      CodeUri: lambdas/
      Handler: status/handler.handler
      MemorySize: 128
      Timeout: 10
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref JobsBucket
      Events:
        GetJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /jobs/{jobId}
            Method: GET

  # ── Lambda: Worker (SQS trigger) ───────────────────────────────────────────
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: podcastify-worker
      CodeUri: lambdas/
      Handler: worker/handler.handler
      MemorySize: 2048
      Timeout: 600   # 10 minutes
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAiApiKey
          ELEVENLABS_API_KEY: !Ref ElevenLabsApiKey
      Policies:
        - S3WritePolicy:
            BucketName: !Ref JobsBucket
        - S3ReadPolicy:
            BucketName: !Ref JobsBucket
      Events:
        SqsTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt JobQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL — set as EXPO_PUBLIC_API_BASE in .env
    Value: !GetAtt Api.ApiEndpoint
  JobsBucketName:
    Description: S3 bucket for job artifacts
    Value: !Ref JobsBucket
  JobQueueUrl:
    Description: SQS queue URL
    Value: !GetAtt JobQueue.QueueUrl
